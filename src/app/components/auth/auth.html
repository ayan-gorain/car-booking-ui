<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center bg-light p-3">
  
  <div class="card shadow-lg border-0 rounded-4 p-4" style="width: 100%; max-width: 440px;">
    
    <!-- Header Logo & Title -->
    <div class="text-center mb-4">
      <div class="bg-primary bg-gradient text-white rounded-circle d-inline-flex justify-content-center align-items-center mb-3 shadow-sm" style="width: 60px; height: 60px;">
        <i class="bi bi-car-front-fill fs-3"></i>
      </div>
      <h3 class="fw-bold text-dark mb-1">
        {{ activeTab === 'login' ? 'Welcome Back!' : 'Create Account' }}
      </h3>
      <p class="text-secondary small mb-0">
        {{ activeTab === 'login' ? 'Please log in to manage your car bookings.' : 'Join us today to start booking your rides.' }}
      </p>
    </div>

    <!-- Bootstrap Nav Pills Tab Switcher -->
    <ul class="nav nav-pills nav-justified mb-4 bg-light p-1 rounded-3 border">
      <li class="nav-item">
        <button
          class="nav-link rounded-3 fw-semibold py-2"
          [class.active]="activeTab === 'login'"
          (click)="setTab('login')"
          type="button">
          <i class="bi bi-box-arrow-in-right me-1"></i> Login
        </button>
      </li>
      <li class="nav-item">
        <button
          class="nav-link rounded-3 fw-semibold py-2"
          [class.active]="activeTab === 'signup'"
          (click)="setTab('signup')"
          type="button">
          <i class="bi bi-person-plus me-1"></i> Sign Up
        </button>
      </li>
    </ul>

    <!-- LOGIN CHILD COMPONENT -->
    <app-login
      *ngIf="activeTab === 'login'"
      (switchToSignup)="setTab('signup')">
    </app-login>

    <!-- SIGN UP CHILD COMPONENT -->
    <app-signup
      *ngIf="activeTab === 'signup'"
      (switchToLogin)="setTab('login')">
    </app-signup>

  </div>
</div>
