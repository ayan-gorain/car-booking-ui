<form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()" novalidate>

  <!-- Email Field -->
  <div class="mb-3">
    <label class="form-label fw-semibold small">Email Address</label>
    <div class="input-group">
      <span class="input-group-text bg-white text-secondary">
        <i class="bi bi-envelope"></i>
      </span>
      <input
        type="email"
        class="form-control"
        formControlName="email"
        placeholder="Enter your email">
    </div>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
      Email is required.
    </small>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">
      Please enter a valid email address.
    </small>
  </div>

  <!-- Password Field -->
  <div class="mb-3">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <label class="form-label fw-semibold small mb-0">Password</label>
      <a href="javascript:void(0)" class="small text-decoration-none text-primary fw-semibold">Forgot password?</a>
    </div>
    <div class="input-group">
      <span class="input-group-text bg-white text-secondary">
        <i class="bi bi-lock"></i>
      </span>
      <input
        [type]="showLoginPassword ? 'text' : 'password'"
        class="form-control"
        formControlName="password"
        placeholder="Enter your password">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="showLoginPassword = !showLoginPassword">
        <i class="bi" [class.bi-eye]="!showLoginPassword" [class.bi-eye-slash]="showLoginPassword"></i>
      </button>
    </div>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">
      Password is required.
    </small>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')">
      Password must be at least 6 characters.
    </small>
  </div>

  <!-- Remember Me -->
  <div class="form-check mb-4">
    <input class="form-check-input" type="checkbox" id="rememberMe" formControlName="rememberMe">
    <label class="form-check-label small text-secondary" for="rememberMe">
      Remember me
    </label>
  </div>

  <!-- Login Submit Button -->
  <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
    Log In
  </button>

  <!-- Switch to Sign Up -->
  <p class="text-center small text-secondary mt-4 mb-0">
    Don't have an account?
    <a href="javascript:void(0)" (click)="onSwitchToSignup()" class="text-primary fw-bold text-decoration-none ms-1">Sign Up</a>
  </p>

</form>
