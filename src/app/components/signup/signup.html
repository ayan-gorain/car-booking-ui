<form [formGroup]="signupForm" (ngSubmit)="onSignupSubmit()" novalidate>
  
  <!-- Full Name -->
  <div class="mb-3">
    <label class="form-label fw-semibold small">Full Name</label>
    <div class="input-group">
      <span class="input-group-text bg-white text-secondary">
        <i class="bi bi-person"></i>
      </span>
      <input
        type="text"
        class="form-control"
        formControlName="fullName"
        placeholder="John Doe">
    </div>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="signupForm.get('fullName')?.touched && signupForm.get('fullName')?.hasError('required')">
      Full Name is required.
    </small>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="signupForm.get('fullName')?.touched && signupForm.get('fullName')?.hasError('minlength')">
      Minimum 3 characters required.
    </small>
  </div>

  <!-- Email -->
  <div class="mb-3">
    <label class="form-label fw-semibold small">Email Address</label>
    <div class="input-group">
      <span class="input-group-text bg-white text-secondary">
        <i class="bi bi-envelope"></i>
      </span>
      <input
        type="email"
        class="form-control"
        formControlName="email"
        placeholder="name@example.com">
    </div>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.hasError('required')">
      Email is required.
    </small>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.hasError('email')">
      Please enter a valid email address.
    </small>
  </div>

  <!-- Password -->
  <div class="mb-3">
    <label class="form-label fw-semibold small">Password</label>
    <div class="input-group">
      <span class="input-group-text bg-white text-secondary">
        <i class="bi bi-lock"></i>
      </span>
      <input
        [type]="showSignupPassword ? 'text' : 'password'"
        class="form-control"
        formControlName="password"
        placeholder="Create password">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="showSignupPassword = !showSignupPassword">
        <i class="bi" [class.bi-eye]="!showSignupPassword" [class.bi-eye-slash]="showSignupPassword"></i>
      </button>
    </div>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.hasError('required')">
      Password is required.
    </small>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.hasError('minlength')">
      Password must be at least 6 characters.
    </small>
  </div>

  <!-- Confirm Password -->
  <div class="mb-4">
    <label class="form-label fw-semibold small">Confirm Password</label>
    <div class="input-group">
      <span class="input-group-text bg-white text-secondary">
        <i class="bi bi-shield-check"></i>
      </span>
      <input
        [type]="showConfirmPassword ? 'text' : 'password'"
        class="form-control"
        formControlName="confirmPassword"
        placeholder="Confirm password">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="showConfirmPassword = !showConfirmPassword">
        <i class="bi" [class.bi-eye]="!showConfirmPassword" [class.bi-eye-slash]="showConfirmPassword"></i>
      </button>
    </div>
    <small
      class="text-danger small mt-1 d-block"
      *ngIf="signupForm.get('confirmPassword')?.touched && signupForm.get('confirmPassword')?.hasError('required')">
      Confirm Password is required.
    </small>
  </div>

  <!-- Sign Up Submit Button -->
  <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold shadow-sm">
    Create Account
  </button>

  <!-- Switch to Login -->
  <p class="text-center small text-secondary mt-4 mb-0">
    Already have an account?
    <a href="javascript:void(0)" (click)="onSwitchToLogin()" class="text-primary fw-bold text-decoration-none ms-1">Log In</a>
  </p>

</form>
